<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://www.efb.eg/wp-content/uploads/2021/04/cropped-favicon-1-32x32.png">
  <title>EFB Volunteer Sign up</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #00372c; --container-color: #252525; --input-bg: #333333;
      --accent-green: #006847; --text-white: #ffffff; --error-red: #ff4d4d;
    }
    body { background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; color: var(--text-white); }
    .main-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
    .container { background-color: var(--container-color); width: 100%; max-width: 550px; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
    .progress-container { margin-bottom: 30px; display: flex; justify-content: space-between; position: relative; }
    .progress-bar { position: absolute; top: 50%; left: 0; height: 2px; background: #444; width: 100%; z-index: 1; transform: translateY(-50%); }
    .progress-fill { position: absolute; top: 50%; left: 0; height: 2px; background: var(--accent-green); width: 0%; z-index: 2; transition: 0.3s; transform: translateY(-50%); }
    .step-circle { width: 30px; height: 30px; background: #333; border: 2px solid #444; border-radius: 50%; z-index: 3; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .step-circle.active { border-color: var(--accent-green); background: var(--accent-green); }
    .header-logo { text-align: center; margin-bottom: 20px; }
    .header-logo img { max-width: 180px; }
    .form-step { display: none; }
    .form-step.active { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    h3 { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 18px; text-align: left; }
    label { display: block; margin-top: 15px; font-weight: bold; text-align: left; font-size: 14px; color: var(--text-white); }
    input, select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; background-color: var(--input-bg); color: white; margin-top: 8px; font-size: 14px; }
    input.error-border { border-color: var(--error-red) !important; }
    .error-text { color: var(--error-red); font-size: 11px; margin-top: 4px; display: none; }
    .btn-group { display: flex; gap: 10px; margin-top: 25px; }
    button { flex: 1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 16px; transition: 0.3s; }
    .btn-next { background-color: var(--accent-green); color: white; }
    .btn-prev { background-color: #444; color: white; }
    .hidden { display: none; }
    #userCode { background: #333; padding: 20px; border-radius: 8px; border: 2px dashed #00ffaa; color: #00ffaa; margin: 20px 0; font-size: 32px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

<div class="main-wrapper">
  <div class="container" id="formContainer">
    <div class="header-logo"><img src="https://drive.google.com/thumbnail?id=13qjqwYdOgv0D2vx93pVrFcyeAIwT2IYP&sz=w1000" alt="Logo"></div>
    <div class="progress-container">
      <div class="progress-bar"></div><div class="progress-fill" id="progressFill"></div>
      <div class="step-circle active">1</div><div class="step-circle">2</div><div class="step-circle">3</div><div class="step-circle">4</div>
    </div>
    <form id="volunteerForm">
      <div class="form-step active">
        <h3>Basic Information | البيانات الأساسية</h3>
        <label>Full Name * | الاسم بالكامل</label>
        <input type="text" name="name" data-required="true">
        <label>Age * | السن</label>
        <input type="number" name="age" data-required="true">
        <label>Phone * | رقم الموبايل</label>
        <input type="text" name="phone" id="phoneInput" maxlength="11" data-required="true">
        <div class="btn-group"><button type="button" class="btn-next" onclick="nextStep(1)">Next | التالي</button></div>
      </div>
      </form>
  </div>
  <div id="successMessage" class="container hidden" style="text-align: center;">
    <div style="font-size: 24px; color: #00ffaa;">Success | تم التسجيل بنجاح</div>
    <p>Your ID | كود التطوع الخاص بك:</p>
    <div id="userCode">...</div>
    <button onclick="location.reload()" class="btn-next">New Registration | تسجيل جديد</button>
  </div>
</div>

<script>
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const circles = document.querySelectorAll(".step-circle");

  function nextStep(stepIdx) {
    // التحقق من الحقول (Validation)
    steps[currentStep].classList.remove("active");
    currentStep = stepIdx;
    steps[currentStep].classList.add("active");
    updateProgress();
  }

  function prevStep(stepIdx) {
    steps[currentStep].classList.remove("active");
    currentStep = stepIdx;
    steps[currentStep].classList.add("active");
    updateProgress();
  }

  function updateProgress() {
    circles.forEach((c, i) => c.classList.toggle("active", i <= currentStep));
    document.getElementById("progressFill").style.width = (currentStep / 3) * 100 + "%";
  }

  document.getElementById('volunteerForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    if(btn) btn.disabled = true;
    
    const data = {};
    new FormData(this).forEach((v, k) => data[k] = v);

    fetch("https://script.google.com/macros/s/AKfycbw6OciJHjry54tkPtGqxk5Zzajmfl8KhFu-UWbKEZeXwPl8ZazTGqzzf5rkhngI4SULTQ/exec", {
      method: 'POST',
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
      document.getElementById('formContainer').classList.add('hidden');
      document.getElementById('successMessage').classList.remove('hidden');
      document.getElementById('userCode').innerText = res.code || "N/A";
    });
  };
</script>
</body>
</html>
